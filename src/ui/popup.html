<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Veil</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup" role="main" aria-label="Veil controls">

    <header class="header">
      <h1 class="title">Veil</h1>
      <div id="status" class="status" aria-live="polite">Ready</div>
    </header>

    <div class="actions">
      <button id="btn-summary" class="btn btn-primary" aria-label="Read page summary">
        Read Page Summary
      </button>

      <button id="btn-missing" class="btn btn-secondary" aria-label="What am I missing report">
        What Am I Missing?
      </button>

      <button id="btn-voice" class="btn btn-voice" aria-label="Start voice commands">
        Start Voice Mode
      </button>
    </div>

    <div class="controls">
      <button id="btn-pause" class="btn-small" aria-label="Pause or resume speech" disabled>
        Pause
      </button>
      <button id="btn-stop" class="btn-small" aria-label="Stop speech" disabled>
        Stop
      </button>
      <button id="btn-repeat" class="btn-small" aria-label="Repeat last summary" disabled>
        Repeat
      </button>
    </div>

    <div class="speed-controls">
      <button id="btn-slower" class="btn-small" aria-label="Slower speech">Slower</button>
      <span id="speed-display" class="speed-label" aria-live="polite">Speed: 0.9x</span>
      <button id="btn-faster" class="btn-small" aria-label="Faster speech">Faster</button>
    </div>

    <div id="summary-text" class="summary-text" aria-live="polite" role="region" aria-label="Page summary text"></div>

    <footer class="footer">
      <a href="#" id="settings-link" class="footer-link" aria-label="Open settings">Settings</a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
